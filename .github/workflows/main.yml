import { useState, useEffect, useRef } from 'react'
import { generateQuestion } from './api'
import { isCorrectAnswer } from './utils'
import styles from './App.module.css'

const TOPICS = [
  { id: 'vagtloven', label: 'Vagtloven' },
  { id: 'grundloven', label: 'Grundloven' },
  { id: 'straffeloven', label: 'Straffeloven' },
  { id: 'retsplejeloven', label: 'Retsplejeloven' },
]

const DIFFICULTIES = [
  { id: 'let', label: 'Let', points: 10 },
  { id: 'mellem', label: 'Mellem', points: 20 },
  { id: 'svær', label: 'Svær', points: 30 },
]

const TOTAL = 5

export default function App() {
  const [screen, setScreen] = useState('setup') // setup | game | result
  const [topic, setTopic] = useState('vagtloven')
  const [difficulty, setDifficulty] = useState('let')

  const [question, setQuestion] = useState(null)
  const [loading, setLoading] = useState(false)
  const [error, setError] = useState(null)
  const [answered, setAnswered] = useState(false)
  const [answerState, setAnswerState] = useState(null) // 'correct' | 'wrong'
  const [showHint, setShowHint] = useState(false)

  const [currentQ, setCurrentQ] = useState(0)
  const [correct, setCorrect] = useState(0)
  const [wrong, setWrong] = useState(0)
  const [points, setPoints] = useState(0)

  const inputRef = useRef(null)

  async function loadQuestion(qNum) {
    setLoading(true)
    setError(null)
    setQuestion(null)
    setAnswered(false)
    setAnswerState(null)
    setShowHint(false)
    try {
      const q = await generateQuestion(topic, difficulty, qNum + 1, TOTAL)
      setQuestion(q)
      setTimeout(() => inputRef.current?.focus(), 50)
    } catch (e) {
      setError(e.message)
    } finally {
      setLoading(false)
    }
  }

  function startGame() {
    setCurrentQ(0)
    setCorrect(0)
    setWrong(0)
    setPoints(0)
    setScreen('game')
  }

  useEffect(() => {
    if (screen === 'game') {
      loadQuestion(currentQ)
    }
  }, [screen, currentQ])

  function handleCheck() {
    if (answered || !question) return
    const val = inputRef.current?.value || ''
    if (!val.trim()) return
    const ok = isCorrectAnswer(val, question.answer)
    setAnswered(true)
    setAnswerState(ok ? 'correct' : 'wrong')
    if (ok) {
      setCorrect(c => c + 1)
      const pts = DIFFICULTIES.find(d => d.id === difficulty)?.points || 10
      setPoints(p => p + pts)
    } else {
      setWrong(w => w + 1)
    }
  }

  function handleNext() {
    if (currentQ + 1 >= TOTAL) {
      setScreen('result')
    } else {
      setCurrentQ(q => q + 1)
    }
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter') {
      if (!answered) handleCheck()
      else handleNext()
    }
  }

  const progress = Math.round(((answered ? currentQ + 1 : currentQ) / TOTAL) * 100)
  const pct = Math.round((correct / TOTAL) * 100)

  const resultMsg =
    pct < 40
      ? 'Hold ud — du lærer noget nyt hver gang!'
      : pct < 60
      ? 'Godt forsøgt! Gennemgå de svar du missede.'
      : pct < 85
      ? 'Flot! Du er godt på vej.'
      : 'Fremragende! Du kender lovgivningen godt.'

  if (screen === 'setup') {
    return (
      <div className={styles.page}>
        <div className={styles.container}>
          <h1 className={styles.title}>Lovgivning vendespil</h1>
          <p className={styles.subtitle}>
            Udfyld det manglende ord — spørgsmål genereres dynamisk af Claude AI
          </p>

          <div className={styles.section}>
            <p className={styles.sectionLabel}>Emne</p>
            <div className={styles.pillRow}>
              {TOPICS.map(t => (
                <button
                  key={t.id}
                  className={`${styles.pill} ${topic === t.id ? styles.pillActiveTeal : ''}`}
                  onClick={() => setTopic(t.id)}
                >
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          <div className={styles.section}>
            <p className={styles.sectionLabel}>Sværhedsgrad</p>
            <div className={styles.pillRow}>
              {DIFFICULTIES.map(d => (
                <button
                  key={d.id}
                  className={`${styles.pill} ${difficulty === d.id ? styles.pillActivePurple : ''}`}
                  onClick={() => setDifficulty(d.id)}
                >
                  {d.label} <span className={styles.pts}>+{d.points}pt</span>
                </button>
              ))}
            </div>
          </div>

          <button className={styles.btnPrimary} onClick={startGame}>
            ▶ Start spil
          </button>
        </div>
      </div>
    )
  }

  if (screen === 'result') {
    return (
      <div className={styles.page}>
        <div className={styles.container}>
          <div className={styles.resultWrap}>
            <div className={styles.resultScore}>{correct} / {TOTAL}</div>
            <p className={styles.resultMsg}>{pct}% korrekt — {resultMsg}</p>
            <p className={styles.resultPoints}>{points} point optjent</p>
            <div className={styles.btnRow}>
              <button className={styles.btnPrimary} onClick={() => { setScreen('game'); setCurrentQ(0); setCorrect(0); setWrong(0); setPoints(0) }}>
                ↺ Spil igen
              </button>
              <button className={styles.btnSecondary} onClick={() => setScreen('setup')}>
                ⚙ Skift indstillinger
              </button>
            </div>
          </div>
        </div>
      </div>
    )
  }

  return (
    <div className={styles.page}>
      <div className={styles.container}>
        <div className={styles.progressBg}>
          <div className={styles.progressFill} style={{ width: progress + '%' }} />
        </div>

        <div className={styles.stats}>
          <div className={styles.stat}>
            <div className={styles.statLabel}>Spørgsmål</div>
            <div className={styles.statVal}>{currentQ + 1}/{TOTAL}</div>
          </div>
          <div className={styles.stat}>
            <div className={styles.statLabel}>✓ Rigtige</div>
            <div className={`${styles.statVal} ${styles.green}`}>{correct}</div>
          </div>
          <div className={styles.stat}>
            <div className={styles.statLabel}>✗ Forkerte</div>
            <div className={`${styles.statVal} ${styles.red}`}>{wrong}</div>
          </div>
          <div className={styles.stat}>
            <div className={styles.statLabel}>Point</div>
            <div className={styles.statVal}>{points}</div>
          </div>
        </div>

        {loading && (
          <div className={styles.loadingState}>
            <span className={styles.spinner} /> Genererer spørgsmål...
          </div>
        )}

        {error && (
          <div className={styles.errorMsg}>
            ⚠ {error}
            <button className={styles.retryBtn} onClick={() => loadQuestion(currentQ)}>Prøv igen</button>
          </div>
        )}

        {question && !loading && (
          <div className={styles.card}>
            <div className={styles.cardMeta}>
              <span className={styles.badge}>{question.category}</span>
              <span className={styles.qNum}>Spørgsmål {currentQ + 1} af {TOTAL}</span>
            </div>

            <p className={styles.sentence}>
              {question.sentence.split('_____').map((part, i, arr) => (
                <span key={i}>
                  {part}
                  {i < arr.length - 1 && <span className={styles.blank}>_____</span>}
                </span>
              ))}
            </p>

            <input
              ref={inputRef}
              type="text"
              className={`${styles.answerInput} ${
                answerState === 'correct' ? styles.inputCorrect :
                answerState === 'wrong' ? styles.inputWrong : ''
              }`}
              placeholder="Skriv dit svar her..."
              disabled={answered}
              onKeyDown={handleKeyDown}
              autoComplete="off"
            />

            {showHint && (
              <p className={styles.hint}>💡 {question.hint}</p>
            )}

            {answered && (
              <div className={`${styles.feedback} ${answerState === 'correct' ? styles.feedbackCorrect : styles.feedbackWrong}`}>
                {answerState === 'correct' ? '✓ Korrekt! ' : `✗ Forkert. Svaret er: "${question.answer}". `}
                {question.explanation}
              </div>
            )}

            <div className={styles.btnRow}>
              {!answered && (
                <>
                  <button className={styles.btnPrimary} onClick={handleCheck}>
                    ✓ Tjek svar
                  </button>
                  {!showHint && (
                    <button className={styles.btnSecondary} onClick={() => setShowHint(true)}>
                      💡 Hint
                    </button>
                  )}
                </>
              )}
              {answered && (
                <button className={styles.btnPrimary} onClick={handleNext}>
                  {currentQ + 1 >= TOTAL ? 'Se resultat →' : 'Næste →'}
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  )
}

export function levenshtein(a, b) {
  const m = a.length, n = b.length
  const dp = Array.from({ length: m + 1 }, (_, i) =>
    Array.from({ length: n + 1 }, (_, j) => (i === 0 ? j : j === 0 ? i : 0))
  )
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] =
        a[i - 1] === b[j - 1]
          ? dp[i - 1][j - 1]
          : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1])
  return dp[m][n]
}

export function isCorrectAnswer(userAnswer, correctAnswer) {
  const u = userAnswer.trim().toLowerCase()
  const c = correctAnswer.trim().toLowerCase()
  return u === c || c.includes(u) || u.includes(c) || levenshtein(u, c) <= 2
}

const API_KEY = import.meta.env.VITE_ANTHROPIC_API_KEY

export async function generateQuestion(topic, difficulty, questionNumber, total) {
  if (!API_KEY) {
    throw new Error('VITE_ANTHROPIC_API_KEY mangler i .env filen')
  }

  const diffMap = { let: 'basic', mellem: 'intermediate', svær: 'advanced' }
  const topicMap = {
    vagtloven: 'den danske vagtlov (lov om vagtvirksomhed)',
    grundloven: 'den danske grundlov',
    straffeloven: 'den danske straffelov',
    retsplejeloven: 'den danske retsplejelov',
  }
  const diffDesc = {
    let: 'grundlæggende begreber og definitioner',
    mellem: 'specifikke paragraffer og krav',
    svær: 'komplekse juridiske nuancer og undtagelser',
  }

  const prompt = `Du er en ekspert i dansk lovgivning. Generer ét udfyld-det-manglende-ord spørgsmål om ${topicMap[topic]} på sværhedsgrad ${diffMap[difficulty]}.

Returner KUN et JSON objekt (ingen markdown, ingen kodeblok) med disse felter:
{
  "sentence": "Sætningen med _____ som markerer det manglende ord",
  "answer": "det korrekte ord eller korte udtryk",
  "hint": "et kort hint uden at afsløre svaret",
  "category": "kort kategori label (maks 3 ord)",
  "explanation": "kort forklaring på 1-2 sætninger om hvorfor svaret er korrekt"
}

Regler:
- Sætningen skal være faktuel og baseret på ${topicMap[topic]}
- Det manglende ord/udtryk skal være præcist og entydigt
- Sværhedsgrad ${diffMap[difficulty]}: ${diffDesc[difficulty]}
- Skriv på dansk
- Dette er spørgsmål nummer ${questionNumber} af ${total} — vælg et ANDET aspekt end tidligere spørgsmål`

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }],
    }),
  })

  if (!response.ok) {
    const err = await response.json().catch(() => ({}))
    throw new Error(err?.error?.message || `API fejl: ${response.status}`)
  }

  const data = await response.json()
  const text = data.content.map(i => i.text || '').join('')
  const clean = text.replace(/```json|```/g, '').trim()
  return JSON.parse(clean)
}

