# Lovgivning Vendespil

Et dansk lovgivnings-læringsspil med fill-in-the-blank spørgsmål genereret dynamisk af Claude AI.

## Opsætning

### 1. Installer afhængigheder

```bash
npm install
```

### 2. Opret API nøgle fil

Kopier `.env.example` til `.env`:

```bash
cp .env.example .env
```

Åbn `.env` og indsæt din Anthropic API nøgle:

```
VITE_ANTHROPIC_API_KEY=sk-ant-...
```

Du kan oprette en API nøgle på: https://console.anthropic.com/

### 3. Start udviklingsserveren

```bash
npm run dev
```

Åbn [http://localhost:3000](http://localhost:3000) i din browser.

## Funktioner

- 4 emner: Vagtloven, Grundloven, Straffeloven, Forvaltningsloven
- 3 sværhedsgrader: Let, Mellem, Svær
- Claude AI genererer 5 unikke spørgsmål per spil
- Fuzzy matching — tolererer små stavefejl
- Hint-system og forklaringer efter hvert svar
- Pointsystem med stigende point per sværhedsgrad

## Bygning til produktion

```bash
npm run build
```

Output placeres i `dist/` mappen.

## Bemærk

API-nøglen bruges direkte fra browseren. Til produktion anbefales det at sætte en backend proxy op så nøglen ikke eksponeres.

